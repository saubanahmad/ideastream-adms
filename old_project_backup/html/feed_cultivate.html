<script>
let currentFeed = 'fifo';
let allIdeas = [];

// Check authentication
async function checkAuth() {
    try {
        const res = await fetch('/api/user/current');
        const data = await res.json();
        if (data.username) {
            document.getElementById('username').textContent = data.username;
        } else {
            window.location.href = '/login_new.html';
        }
    } catch (err) {
        window.location.href = '/login_new.html';
    }
}

// Load feed
async function loadFeed(type = 'fifo') {
    try {
        const endpoint = `/api/feed/filtered?theme=Cultivate&type=${type}`;
        const res = await fetch(endpoint);
        allIdeas = await res.json();
        displayIdeas(allIdeas);
    } catch (err) {
        console.error('Error loading feed:', err);
        document.getElementById('feedContainer').innerHTML = '<p style="color: #41644A; font-family: Fredoka;">Error loading ideas</p>';
    }
}

// Display ideas
function displayIdeas(ideas) {
    const container = document.getElementById('feedContainer');
    
    if (ideas.length === 0) {
        container.innerHTML = '<p style="color: #41644A; font-family: Fredoka; margin-left: 10px;">No ideas yet. Be the first to share!</p>';
        return;
    }
    
    const currentUser = document.getElementById('username').textContent;
    
    container.innerHTML = ideas.map(idea => `
        <div class="feed-item">
            <div class="idea-header">
                <span class="idea-author">${idea.author}</span>
                <span class="idea-tag">${idea.themeTag || 'Idea Stream'}</span>
            </div>
            ${idea.title ? `<div class="idea-title">${idea.title}</div>` : ''}
            <div class="idea-content" id="content-${idea.id}">${idea.content}</div>
            <div class="idea-actions">
                <button class="vote-btn-up ${idea.userVote === 1 ? 'voted' : ''}" onclick="vote(${idea.id}, 1)"></button>
                <span class="vote-count">${idea.upvotes - idea.downvotes}</span>
                <button class="vote-btn-down ${idea.userVote === -1 ? 'voted' : ''}" onclick="vote(${idea.id}, -1)"></button>
                <button class="comment-btn" onclick="toggleComments(${idea.id})">💬 ${idea.comments.length}</button>
                ${idea.author === currentUser ? `
                    <button class="edit-btn" onclick="editIdea(${idea.id})">Edit</button>
                    <button class="delete-btn" onclick="deleteIdea(${idea.id})">Delete</button>
                ` : ''}
            </div>
            <div class="comments-section" id="comments-${idea.id}">
                <div class="comments-list">
                    ${idea.comments.map(c => `
                        <div class="comment-item">
                            <div class="comment-author">${c.author}</div>
                            <div class="comment-text">${c.content}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="comment-input-container">
                    <input type="text" class="comment-input" id="comment-input-${idea.id}" placeholder="Add a comment...">
                    <button class="comment-submit-btn" onclick="addComment(${idea.id})">Post</button>
                </div>
            </div>
        </div>
    `).join('');
}

// Switch feed
function switchFeed(type) {
    currentFeed = type;
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    loadFeed(type);
}

// Vote on idea
async function vote(ideaId, voteType) {
    try {
        const endpoint = voteType === 1 ? `/api/post/${ideaId}/upvote` : `/api/post/${ideaId}/downvote`;
        const res = await fetch(endpoint, { method: 'POST' });
        const data = await res.json();
        
        if (data.status === 'success') {
            loadFeed(currentFeed);
        }
    } catch (err) {
        console.error('Error voting:', err);
    }
}

// Toggle comments
function toggleComments(ideaId) {
    const section = document.getElementById(`comments-${ideaId}`);
    section.classList.toggle('show');
}

// Add comment
async function addComment(ideaId) {
    const input = document.getElementById(`comment-input-${ideaId}`);
    const comment = input.value.trim();
    
    if (!comment) return;
    
    try {
        const formData = new URLSearchParams();
        formData.append('comment', comment);
        
        const res = await fetch(`/api/post/${ideaId}/comment`, {
            method: 'POST',
            body: formData
        });
        
        const data = await res.json();
        if (data.status === 'success') {
            input.value = '';
            loadFeed(currentFeed);
        }
    } catch (err) {
        console.error('Error adding comment:', err);
    }
}

// Search ideas
function searchIdeas() {
    const query = document.getElementById('searchBox').value.trim();
    
    if (!query) {
        loadFeed(currentFeed);
        return;
    }
    
    fetch(`/api/search?q=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(ideas => displayIdeas(ideas))
        .catch(err => console.error('Error searching:', err));
}

// Allow Enter key for search
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('searchBox').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchIdeas();
    });
});

// Load friend suggestions
async function loadSuggestions() {
    try {
        const res = await fetch('/api/users');
        const users = await res.json();
        
        const container = document.getElementById('suggestionsList');
        if (users.length === 0) {
            container.innerHTML = '<div class="person-box">No suggestions</div>';
            return;
        }
        
        container.innerHTML = users.map(user => `
            <div class="person-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>${user.fullName || user.username}</span>
                    <button class="add-friend-btn" onclick="addFriend('${user.username}')">Add</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error('Error loading suggestions:', err);
    }
}

// Add friend
async function addFriend(username) {
    try {
        const formData = new URLSearchParams();
        formData.append('username', username);
        
        const res = await fetch('/api/friend/add', {
            method: 'POST',
            body: formData
        });
        
        const data = await res.json();
        if (data.status === 'success') {
            alert('Friend added successfully!');
            loadSuggestions();
        } else {
            alert(data.message || 'Failed to add friend');
        }
    } catch (err) {
        console.error('Error adding friend:', err);
    }
}

// Edit idea
function editIdea(ideaId) {
    const contentDiv = document.getElementById(`content-${ideaId}`);
    const currentContent = contentDiv.textContent;
    
    const newContent = prompt('Edit your idea:', currentContent);
    if (newContent && newContent.trim() && newContent !== currentContent) {
        const formData = new URLSearchParams();
        formData.append('content', newContent);
        
        fetch(`/api/post/${ideaId}`, {
            method: 'PUT',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                loadFeed(currentFeed);
            } else {
                alert('Failed to edit idea');
            }
        })
        .catch(err => console.error('Error editing idea:', err));
    }
}

// Delete idea
function deleteIdea(ideaId) {
    if (confirm('Are you sure you want to delete this idea?')) {
        fetch(`/api/post/${ideaId}`, {
            method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                loadFeed(currentFeed);
            } else {
                alert('Failed to delete idea');
            }
        })
        .catch(err => console.error('Error deleting idea:', err));
    }
}

// Undo action
async function undoAction() {
    try {
        const res = await fetch('/api/undo', { method: 'POST' });
        const data = await res.json();
        
        if (data.status === 'success') {
            alert(data.message);
            loadFeed(currentFeed);
        } else {
            alert(data.message || 'Nothing to undo');
        }
    } catch (err) {
        console.error('Error undoing action:', err);
        alert('Error undoing action');
    }
}

// Logout
async function logout() {
    try {
        await fetch('/api/logout');
        window.location.href = '/login_new.html';
    } catch (err) {
        console.error('Error logging out:', err);
    }
}

// Initialize
checkAuth();
loadFeed();
loadSuggestions();
</script>
</html>
