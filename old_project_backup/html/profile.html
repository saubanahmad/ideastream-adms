<script>
// Check authentication and load user data
async function checkAuth() {
    try {
        const res = await fetch('/api/user/current');
        const data = await res.json();
        if (data.username) {
            document.getElementById('username').textContent = data.username;
            document.getElementById('displayUsername').value = data.username;
            document.getElementById('fullNameInput').value = data.fullName || '';
        } else {
            window.location.href = '/login_new.html';
        }
    } catch (err) {
        window.location.href = '/login_new.html';
    }
}

// Handle form submission
document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById('fullNameInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const confirmPassword = document.getElementById('confirmPasswordInput').value;

    // Validate passwords match if user is trying to change password
    if (password && password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
    }

    try {
        const formData = new URLSearchParams();
        formData.append('fullName', fullName || '.');
        formData.append('password', password || '.');

        const res = await fetch('/api/user/profile', {
            method: 'PUT',
            body: formData
        });

        const result = await res.json();
        if (result.status === 'success') {
            alert('Profile updated successfully!');
            window.location.href = '/feed.html';
        } else {
            alert(result.message || 'Failed to update profile');
        }
    } catch (err) {
        console.error('Error updating profile:', err);
        alert('Error updating profile. Please try again.');
    }
});

// Undo action
async function undoAction() {
    try {
        const res = await fetch('/api/undo', { method: 'POST' });
        const data = await res.json();
        
        if (data.status === 'success') {
            alert(data.message);
        } else {
            alert(data.message || 'Nothing to undo');
        }
    } catch (err) {
        console.error('Error undoing action:', err);
        alert('Error undoing action');
    }
}

// Logout
async function logout() {
    try {
        await fetch('/api/logout');
        window.location.href = '/login_new.html';
    } catch (err) {
        console.error('Error logging out:', err);
    }
}

// Initialize
checkAuth();
</script>
