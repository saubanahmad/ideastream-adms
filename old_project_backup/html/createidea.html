    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-left">
            <div class="theme-logo">
                <img src="/assets/IdeaStream.png" alt="Logo" class="theme-logo-img">
            </div>
            <input type="text" class="search-box" placeholder="Search...">
            <button class="search-btn"></button>
        </div>

        <div class="top-right">
            <span class="username">{{username}}</span>

            <button class="icon-btn-friends"></button>

        </div>

    <!-- MAIN & RIGHT WRAPPER -->
    <div class="content-wrapper">

        <!-- MAIN FEED -->
        <!-- MAIN CONTAINER -->
<div class="main-container">
    <form class="create-idea-container" id="createIdeaForm">
        <h2>Create Your Idea</h2>

        <input type="text" name="title" class="idea-title-input" placeholder="Title" required>
        <textarea name="description" class="idea-content-input" placeholder="Describe your idea..." required></textarea>
        <select name="theme" class="idea-tags" required>
            <option value="" disabled selected>Select a tag</option>
            <option value="DigitalFrontier">DigitalFrontier</option>
            <option value="Launchpad">Launchpad</option>
            <option value="PlayLab">PlayLab</option>
            <option value="LifeScience">LifeScience</option>
            <option value="TangibleTech">TangibleTech</option>
            <option value="Cultivate">Cultivate</option>
            <option value="FastLane">FastLane</option>
            <option value="UrbanCore">UrbanCore</option>
        </select>


        <button type="submit" class="post-btn">Post</button>
        <script>
            document.getElementById('createIdeaForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const form = e.target;
                const data = new URLSearchParams(new FormData(form));

                const res = await fetch('/postidea', {
                    method: 'POST',
                    body: data
                });

                const result = await res.json();
                if (result.status === 'success') {
                    alert(result.message);
                    window.location.href = result.redirect;
                } else {
                    alert(result.message);
                }
            });
            </script>
    </form>
