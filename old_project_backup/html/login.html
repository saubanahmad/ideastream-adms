<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Fredoka:wght@400;500&display=swap" rel="stylesheet">


    <!-- Linking external CSS -->
</head>
<body>

    <div class="main-container">

        <!-- Left Section (2/3 width) -->
        <div class="left-section">
            <img src="/assets/logo.png" alt="Left Image" class="left-image">
            <p class="left-caption">Dream. Share. Vote. Build.</p>
        </div>

        <!-- Right Section (1/3 width) -->
        <div class="right-section">

            <!-- Image in the middle -->
            <div class="right-image-container">
                <img src="/assets/ISlogo.png" alt="Logo" class="right-image">
            </div>

            <!-- Input Fields -->
            <form action="/login" method="post" class="login-form">
                <input type="text" name="username" placeholder="Username" class="login-input" required>
                <input type="password" name="password" placeholder="Password" class="login-input" required>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <!-- OR Line -->
            <div class="or-container">
                <hr>
                <span>OR</span>
                <hr>
            </div>

            <!-- Sign Up Link -->
            <a href="/signup" class="signup-link">Sign Up</a>

        </div>
        <div class="bottom-buttons">
            <button class="round-btn" id="undo-btn"></button>
        </div>

    </div>
    
</body>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #FFEAC5;
        font-family: Arial, sans-serif;
    }

    /* Top Bar */

    /* Main Structure */
    .main-container {
        display: flex;
        box-sizing: border-box;
        height: 100vh; /*Full height minus top bar*/
        
    }

    .left-section {
        width: 60%;
        padding: 30px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .left-image {
        max-height: 80%;
        max-width: 80%;
        object-fit: contain;

    }
    .left-caption {
        margin-top: 0px;            /* spacing below the image */
        color: #914F1E;              /* text color */
        font-family: 'Fredoka', sans-serif; /* font */
        font-size: 20px;             /* adjust size as needed */
        text-align: center;          /* center under the image */
    }
    .right-section {
        width: 40%;
        background-color: #914F1E;
        position: fixed; /* keeps it in place */
        top: 0;          /* start at the top of the viewport */
        right: 0;        /* stick to the right edge */
        height: 100vh;   /* full viewport height */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
    }
    .right-image {
        width: 100px;
        height: 100px;
        margin-bottom: 0px;
    }
    .login-form {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;   /* centers input fields horizontally */
        justify-content: center;
    }
     .login-input {
        width: 70%;
        padding: 12px 15px;
        margin: 10px 0;
        border: 1px solid #FFEAC5;
        border-radius: 8px;
        background-color: #914F1E;
        color: #FFEAC5;
        font-family: 'Fredoka', sans-serif;
        font-size: 16px;
        opacity: 1;
        outline: none;
    }

    .login-input::placeholder {
        color: #FFEAC5;
        opacity: 0.6;
    }

    /* Login Button */
    .login-btn {
        width: 77%;
        padding: 8px;
        margin: 20px 0;
        border-radius: 12px;
        border: none;
        background-color: #FFEAC5;
        color: #914F1E;
        font-family: 'Chewy', cursive;
        font-size: 22px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .login-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .login-btn:active {
        transform: scale(1);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* OR Divider */
    .or-container {
        display: flex;
        align-items: center;
        width: 80%;
        margin: 20px 0;
        color: #FFEAC5;
        font-family: 'Fredoka', sans-serif;
        font-weight: 500;
    }

    .or-container hr {
        flex: 1;
        border: none;
        border-top: 1px solid #FFEAC5;
    }

    .or-container span {
        margin: 0 10px;
    }

    /* Sign Up Link */
    .signup-link {
        color: #FFEAC5;
        font-family: 'Fredoka', sans-serif;
        text-decoration: none;
        margin-top: 10px;
    }

    .signup-link:hover {
        text-decoration: underline;
    }


    /* Bottom Buttons */
.bottom-buttons {
    position: fixed;
    bottom: 20px;          /* distance from bottom of screen */
    left: 96%;             /* start at center horizontally */
    transform: translateX(-50%); /* center properly */
    display: flex;
    z-index: 100;          /* above other elements */
}

.round-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;      /* makes it round */
    border: none;
    background-color: #FFEAC5;
    background-image: url('/assets/undobtn.png'); /* put your icon path here */
    background-size: 100%; /* size of icon inside button */
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(145, 79, 30, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
}

    .round-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    /* box-shadow: 0 6px 12px rgba(145, 79, 30, 0.4); */
    }
    .round-btn:active {
        transform: scale(0.95);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

</style>
</html>
