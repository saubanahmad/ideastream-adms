<script>
// Check authentication
async function checkAuth() {
    try {
        const res = await fetch('/api/user/current');
        const data = await res.json();
        if (data.username) {
            document.getElementById('username').textContent = data.username;
        } else {
            window.location.href = '/login_new.html';
        }
    } catch (err) {
        window.location.href = '/login_new.html';
    }
}

// Handle form submission
document.getElementById('createIdeaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const form = e.target;
    const data = new URLSearchParams(new FormData(form));

    try {
        const res = await fetch('/api/post/create', {
            method: 'POST',
            body: data
        });

        const result = await res.json();
        if (result.status === 'success') {
            alert('Idea posted successfully!');
            window.location.href = '/feed.html';
        } else {
            alert(result.message || 'Failed to post idea');
        }
    } catch (err) {
        console.error('Error posting idea:', err);
        alert('Error posting idea. Please try again.');
    }
});

// Undo action
async function undoAction() {
    try {
        const res = await fetch('/api/undo', { method: 'POST' });
        const data = await res.json();
        
        if (data.status === 'success') {
            alert(data.message);
        } else {
            alert(data.message || 'Nothing to undo');
        }
    } catch (err) {
        console.error('Error undoing action:', err);
        alert('Error undoing action');
    }
}

// Logout
async function logout() {
    try {
        await fetch('/api/logout');
        window.location.href = '/login_new.html';
    } catch (err) {
        console.error('Error logging out:', err);
    }
}

// Initialize
checkAuth();
</script>
